name: Release Version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dotnet-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: gonatienza/_python4cpm
          token: ${{ secrets._PYTHON4CPM_TOKEN }}
          path: _python4cpm
      - name: Get private repo files
        run : |
          Expand-Archive -Path "_python4cpm\Credentials Management .NET SDK*.zip" -DestinationPath "_python4cpm\framework"
          New-Item -ItemType Directory -Force -Path "src\plugin\lib"
          Copy-Item -Path "_python4cpm\framework\CyberArk.Extensions.Utilties.dll" -Destination "src\plugin\lib"
          Copy-Item -Path "_python4cpm\framework\CyberArk.Extensions.Plugins.Models.dll" -Destination "src\plugin\lib"
      - uses: microsoft/setup-msbuild@v2
      - name: Build .NET Release
        run: |
          msbuild src\plugin\Python4CPM.csproj /p:Configuration=Release /p:Platform="AnyCPU"
      - name: Zip platform
        run: |
          New-Item -ItemType Directory -Force -Path "dist\platform"
          Copy-Item -Path "src\plugin\bin\Release\CyberArk.Extensions.Plugin.Python4CPM.dll" "dist\platform"
          Copy-Item -Path "src\plugin\platform\*" "dist\platform"
          Compress-Archive -Path dist\platform\* -DestinationPath dist\python4cpm-platform.zip -Force
      - uses: actions/upload-artifact@v7
        with:
          name: platform-artifact
          path: dist/python4cpm-platform.zip

  release:
    needs: [dotnet-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        run: |
          MAIN_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV
          FULL_VERSION=$(grep 'AssemblyFileVersion' src/plugin/Properties/AssemblyInfo.cs | sed -E 's/.*"([^"]+)".*/\1/')
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
      - uses: actions/download-artifact@v8
        with:
          name: platform-artifact
          path: dist
      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh
      - name: Delete existing release
        run: gh release delete v${VERSION} -y || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete existing tag
        run: git push -d origin v${VERSION} || true
      - name: Create release and add minor
        run: |
          mv dist/python4cpm-platform.zip dist/python4cpm-platform-${FULL_VERSION}.zip
          gh release create v${MAIN_VERSION} \
            dist/python4cpm-platform-${FULL_VERSION}.zip \
            --title "v${MAIN_VERSION}" \
            --notes "Release v${MAIN_VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
