name: PR Python Module

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  linux-install-and-tests:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
          pytest tests/pythonmodule.py
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logs Linux Python ${{ matrix.python-version }}
          path: Logs/ThirdParty

  macos-install-and-tests:
    name: MacOs Python ${{ matrix.python-version }}
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
          pytest tests/pythonmodule.py
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logs MacOs Python ${{ matrix.python-version }}
          path: Logs/ThirdParty

  windows-install-and-tests:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
          pytest tests/pythonmodule.py
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logs Windows Python ${{ matrix.python-version }}
          path: Logs/ThirdParty
