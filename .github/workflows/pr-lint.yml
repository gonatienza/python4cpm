name: PR Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: ruff check .

  lint-dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'
      - name: Restore
        run: dotnet restore src\plugin\Python4CPM.csproj
      - name: Lint
        run: dotnet format src\plugin\Python4CPM.csproj --verify-no-changes --no-restore
