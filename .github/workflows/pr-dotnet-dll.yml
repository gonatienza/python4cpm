name: PR .NET DLL

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  dotnet-build-and-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: gonatienza/_python4cpm
          token: ${{ secrets._PYTHON4CPM_TOKEN }}
          path: _python4cpm
      - name: Get private repo files
        run : |
          Expand-Archive -Path "_python4cpm\Credentials Management .NET SDK*.zip" -DestinationPath "_python4cpm\framework"
          New-Item -ItemType Directory -Force -Path "src\plugin\lib"
          Copy-Item -Path "_python4cpm\framework\CyberArk.Extensions.Utilties.dll" -Destination "src\plugin\lib"
          Copy-Item -Path "_python4cpm\framework\CyberArk.Extensions.Plugins.Models.dll" -Destination "src\plugin\lib"
      - uses: microsoft/setup-msbuild@v2
      - name: Build .NET Release
        run: |
          msbuild src\plugin\Python4CPM.csproj /p:Configuration=Release /p:Platform="AnyCPU"
      - name: Copy build to framework
        run: |
          Copy-Item -Path "src\plugin\bin\Release\CyberArk.Extensions.Plugin.Python4CPM.dll" "_python4cpm\framework"
      - uses: actions/setup-python@v4
        with:
          python-version: 3.14
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
          pytest tests/dotnetdll.py
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Logs
          path: Logs/ThirdParty
